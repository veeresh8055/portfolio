<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Veeresh | portfolio</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="main">
      <div class="navbar">
        <div class="nav">
          <a href="#">Home</a>
          <a href="#project">Project</a>
          <a href="#">Resume</a>
        </div>
        <button class="toggle" id="themeToggle" type="button" aria-label="Switch to dark mode" aria-pressed="false">
          <img id="themeIcon" src="./svg/dark.svg" alt="dark mode icon" />
        </button>
      </div>

      <div class="container">
        <!-- Profile  -->
        <div class="profile">
          <div class="imgName">
            <img src="./images/profile.jpg" alt="Profile photo" />

            <div class="name">
              <h2>
                Veeresh B C
                <img id="nameSound" src="./svg/sound.svg" alt="sound icon" class="sound-icon" />
              </h2>
              <p><span class="dot"></span> Open for work</p>
            </div>
          </div>
          <p>Love to build cool stuf and modern UI</p>
        </div>

        <!-- About -->
        <div class="about">
          <h2>About</h2>
          <div class="aboutContent">
            <div class="aboutOne">
              <p><img  src="./svg/location.svg" alt="location" /> Gadag, Karnataka</p>
              <p id="connect"><img src="./svg/location.svg" alt="phone" /> +91112223330</p>
              <p id="connect"><img src="./svg/link.svg" alt="website" /> veeresh.me</p>
            </div>
            <div class="aboutTwo">
              <p><img src="./svg/location.svg" alt="time" /> 12:22</p>
              <p id="connect">
                <img src="./svg/mail.svg" alt="email" /> veereshchared@gmail.com
              </p>
              <p><img src="./svg/gender.svg" alt="gender" /> he/him</p>
            </div>
          </div>
        </div>

        <!-- project -->
        <div class="project" id="project">

          <div class="projectContent">
            <div class="projectCard div1">
              <div class="media">
                <img src="./images/repo.png" alt="Portfolio website preview" />
                <video class="preview-video" muted loop playsinline preload="metadata">
                  <source src="./videos/windows-11.mp4" type="video/mp4" />
                </video>
              </div>
              <h4>Portfolio Website</h4>
              <div class="stacks">
                <img src="./images/html-min.webp" alt="HTML" />
                <img src="./images/css-min.webp" alt="CSS" />
                <img src="./images/js-min.webp" alt="JavaScript" />
              </div>
            </div>

            <div class="projectCard div2">
              <div class="media">
                <img src="./images/worklink.png" alt="Worklink app preview" />
                <video class="preview-video" muted loop playsinline preload="metadata">
                  <source src="./videos/windows-11.mp4" type="video/mp4" />
                </video>
              </div>
              <h4>Worklink App</h4>
              <div class="stacks">
                <img src="./images/react.svg" alt="React" />
                <img src="./images/node-min.webp" alt="Node.js" />
                <img src="./images/mongodb-min.webp" alt="MongoDB" />
              </div>
            </div>

            <div class="projectCard div3">
              <div class="media">
                <img src="./images/canva.png" alt="Design dashboard preview" />
                <video class="preview-video" muted loop playsinline preload="metadata">
                  <source src="./videos/windows-11.mp4" type="video/mp4" />
                </video>
              </div>
              <h4>Design Dashboard</h4>
              <div class="stacks">
                <img src="./images/html-min.webp" alt="HTML" />
                <img src="./images/css-min.webp" alt="CSS" />
                <img src="./images/js-min.webp" alt="JavaScript" />
              </div>
            </div>

            <div class="projectCard div4">
              <div class="media">
                <img src="./images/barba-min.webp" alt="Animation site preview" />
                <video class="preview-video" muted loop playsinline preload="metadata">
                  <source src="./videos/windows-11.mp4" type="video/mp4" />
                </video>
              </div>
              <h4>Animation Landing</h4>
              <div class="stacks">
                <img src="./images/gsap-min.webp" alt="GSAP" />
                <img src="./images/js-min.webp" alt="JavaScript" />
                <img src="./images/swiper.svg" alt="Swiper" />
              </div>
            </div>

            <div class="projectCard div5">
              <div class="media">
                <img src="./images/hii.webp" alt="Brand page preview" />
                <video class="preview-video" muted loop playsinline preload="metadata">
                  <source src="./videos/windows-11.mp4" type="video/mp4" />
                </video>
              </div>
              <h4>Brand Showcase</h4>
              <div class="stacks">
                <img src="./images/figma-min.webp" alt="Figma" />
                <img src="./images/react.svg" alt="React" />
                <img src="./images/tailwind.png" alt="Tailwind CSS" />
              </div>
            </div>

            <div class="projectCard div6">
              <div class="media">
                <img src="./images/download-min.webp" alt="Shop preview" />
                <video class="preview-video" muted loop playsinline preload="metadata">
                  <source src="./videos/windows-11.mp4" type="video/mp4" />
                </video>
              </div>
              <h4>Commerce UI</h4>
              <div class="stacks">
                <img src="./images/nextjs.png" alt="Next.js" />
                <img src="./images/redux.png" alt="Redux" />
                <img src="./images/zustand.jpeg" alt="Zustand" />
              </div>
            </div>
          </div>
        </div>

        <div class="skills">
          <h2>stack</h2>
           
        </div>
      </div>

      <div class="footer"></div>
    </div>
    <script src="script.js"></script>

</html>
